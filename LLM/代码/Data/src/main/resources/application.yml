server:
  port: 8001

spring:
  application:
    name: data-service

  # PostgreSQL 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.163.174:5432/prompt
    username: hxl
    password: hxl

  # Nacos 配置（兼容 Nacos 2.5.2）
  cloud:
    nacos:
      discovery:
        # Nacos 2.x 使用 8848 作为 HTTP 端口，客户端会自动使用 9848 进行 gRPC 通信
        server-addr: 192.168.163.174:8848
        namespace: public
        group: DEFAULT_GROUP
        enabled: false
        # 非阻塞启动，避免连接失败导致应用启动失败
        fail-fast: false
        # 注册实例的权重
        weight: 1.0
        # 心跳间隔（毫秒）
        heart-beat-interval: 5000
        # 心跳超时（毫秒）
        heart-beat-timeout: 15000
        # IP 删除超时（毫秒）
        ip-delete-timeout: 30000
        # Nacos 2.5.2 认证配置（如果服务端启用了认证）
        username: nacos
        password: nacos
      config:
        server-addr: 192.168.163.174:8848
        file-extension: yml
        namespace: public
        group: DEFAULT_GROUP
        enabled: true
        import-check:
          enabled: false
        # 配置刷新超时（毫秒）
        timeout: 3000
        # Nacos 2.5.2 认证配置（如果服务端启用了认证）
        username: nacos
        password: nacos
        # 最大重试次数
        max-retry: 3
        # 配置长轮询超时时间（毫秒）
        config-long-poll-timeout: 30000
        # 配置重试时间（毫秒）
        config-retry-time: 2000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 日志配置
logging:
  level:
    root: INFO

