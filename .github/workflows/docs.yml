name: Deploy MkDocs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "mkdocs-material>=9.5,<10" "mkdocs>=1.6,<2"
      - run: mkdocs gh-deploy -f .mkdocs/mkdocs.yml --force
