name: Deploy MkDocs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml "mkdocs-material>=9.5,<10" "mkdocs>=1.6,<2"

      - name: Auto-sync nav
        run: python scripts/sync_nav.py

      - name: Commit nav changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No nav changes."
          else
            git add .mkdocs/mkdocs.yml
            git commit -m "chore: 自动同步 nav 遗漏笔记"
            git push
          fi

      - run: mkdocs gh-deploy -f .mkdocs/mkdocs.yml --force
