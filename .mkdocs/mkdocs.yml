site_name: 郝鑫磊的技术笔记
site_description: Java 后端 & 大模型开发学习笔记
site_author: cowfat97
site_dir: ../../site
site_url: https://cowfat97.github.io/notes/
docs_dir: ".."

plugins:
  - search
  - blog:
      blog_dir: "."
      post_dir: "posts"
      archive: true
      categories: true

theme:
  name: material
  language: zh
  features:
    - navigation.tracking
    - search.highlight

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables

nav:
  - Java:
      - 基础: Java/Java 基础/Java 的特性.md
      - JVM: Java/JVM/JVM 内存结构.md
      - 多线程:
          - 线程创建: Java/多线程/线程创建.md
          - 线程状态: Java/多线程/线程状态.md
          - 线程池队列: Java/多线程/线程池队列.md
      - 事务:
          - 事务控制: Java/事务/事务控制.md
          - 多线程事务: Java/事务/多线程事务.md
      - 集合:
          - List: Java/集合/List.md
          - HashMap 线程安全: Java/集合/HashMap 线程安全吗？.md
      - 框架:
          - Spring IoC: Java/框架/spring/Ioc 的实现.md
          - MyBatis:
              - 类型转换: Java/框架/mybatis/模块/类型转换/类型转换.md
              - 适配器模式: Java/框架/mybatis/设计模式/适配器模式.md
      - 工具:
          - Druid: Java/工具/Druid.md
          - JUnit: Java/工具/Junit.md
          - Swagger: Java/工具/Swagger.md
  - 中间件:
      - Redis 集群: 中间件/Redis/Redis集群模式.md
      - Nginx 配置: 中间件/Nginx/Nginx 配置.md
  - 数据库:
      - 特性: 数据库/Mysql/数据库特性.md
      - 索引: 数据库/Mysql/索引.md
      - 事务: 数据库/Mysql/数据库事务.md
  - LLM:
      - Agent:
          - Agent: LLM/Agent/Agent.md
          - AgentPatterns: LLM/Agent/AgentPatterns.md
          - FunctionCall: LLM/Agent/FunctionCall.md
          - MCP: LLM/Agent/MCP.md
          - A2A: LLM/Agent/A2A.md
          - SmartVoyage: LLM/Agent/SmartVoyage.md
          - Langgraph: LLM/Agent/Langgraph/README.md
      - RAG:
          - RAG 概述: LLM/Rag/RAG.md
          - 文档处理: LLM/Rag/文档处理.md
          - 文档向量化: LLM/Rag/文档向量化.md
      - 费曼视频: LLM/费曼视频.md
  - 408:
      - 数据结构概述: 408/数据结构/数据结构概述.md
  - LeetCode: leetcode/PROGRESS.md
